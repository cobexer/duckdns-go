name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -v -cover -race ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Go version from go.mod
        id: goversion
        run: echo "version=$(grep '^go ' go.mod | cut -d' ' -f2 | cut -d'.' -f1,2)" >> $GITHUB_OUTPUT
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/cobexer/duckdns-go
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/386,linux/amd64,linux/arm/v7,linux/arm64
          build-args: GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - {os: linux,   arch: 386}
          - {os: linux,   arch: amd64}
          - {os: linux,   arch: arm}
          - {os: linux,   arch: arm64}
          - {os: darwin,  arch: amd64}
          - {os: darwin,  arch: arm64}
          - {os: freebsd, arch: 386}
          - {os: freebsd, arch: amd64}
          - {os: windows, arch: 386,   ext: .exe}
          - {os: windows, arch: amd64, ext: .exe}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -ldflags '-s -w' -o duckdns-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./
      - name: Upload binary to release
        run: gh release upload "$GITHUB_REF_NAME" "duckdns-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
