name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -v -cover -race ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - {os: linux,   arch: 386}
          - {os: linux,   arch: amd64}
          - {os: linux,   arch: arm}
          - {os: linux,   arch: arm64}
          - {os: darwin,  arch: amd64}
          - {os: darwin,  arch: arm64}
          - {os: freebsd, arch: 386}
          - {os: freebsd, arch: amd64}
          - {os: windows, arch: 386,   ext: .exe}
          - {os: windows, arch: amd64, ext: .exe}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -ldflags '-s -w' -o duckdns-go-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./
